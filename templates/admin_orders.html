{% extends 'base.html' %}

{% block content %}
<div class="admin-page">
    <h2>Update Order Status <span class="text-primary">#ORD-{{ "%06d"|format(order.id) }}</span></h2>
    <div class="card" style="max-width: 500px; margin: 2rem auto;">
        <form action="{{ url_for('update_order_status', order_id=order.id) }}" method="POST">
            <div class="form-group">
                <label>Current Status:</label>
                <p><strong>{{ order.status }}</strong></p>
            </div>
            <div class="form-group">
                <label for="status">New Status:</label>
                <select name="status" id="status" style="width: 100%; padding: 0.8rem; border-radius: 8px; border: 1px solid #ffb6c1;">
                    {% for st in statuses %}
                    <option value="{{ st }}" {% if st == order.status %}selected{% endif %}>{{ st }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Update Status</button>
        </form>
        <br>
        <a href="{{ url_for('order_detail', order_id=order.id) }}" class="btn btn-outline btn-block text-center">Back to Order</a>
    </div>
</div>
{% endblock %}
