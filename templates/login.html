{% extends 'base.html' %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2 class="text-primary text-center">Login</h2>
        <p class="text-center text-muted">Welcome back to Avistore.</p>
        <br>
        <form action="{{ url_for('login', next=request.args.get('next', '')) }}" method="POST">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block btn-large">Sign In</button>
        </form>
        <div class="auth-links text-center">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
